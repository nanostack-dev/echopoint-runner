version: 2

project_name: echopoint-runner

before:
  hooks:
    - go mod tidy

builds:
  - id: echopoint-runner
    main: ./cmd/runner
    binary: echopoint-runner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    # Must match the names the echopoint GitHub Action downloads:
    # echopoint-runner_<version>_<os>_<arch>.<tar.gz|zip>
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - docs/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: nanostack-dev
    name: echopoint-runner
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
