name: Go Build and Test

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'it/**/*.json'
      - 'Dockerfile'
      - '.github/workflows/go.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.go'
      - '**/go.mod'
      - '**/go.sum'
      - 'it/**/*.json'
      - 'Dockerfile'
      - '.github/workflows/go.yml'
  workflow_dispatch:

jobs:
  lint-runner:
    name: Lint echopoint-runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          working-directory: .
          args: --timeout 5m --path-mode=abs
          skip-pkg-cache: true
          skip-build-cache: true

  tests-runner:
    name: Test echopoint-runner
    runs-on: ubuntu-latest
    needs: lint-runner
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install gotestsum
        run: |
          go install gotest.tools/gotestsum@v1.13.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: gotestsum --format github-actions -- ./...

  docker-push:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    needs: [lint-runner, tests-runner]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/echopoint-runner
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=echopoint-runner
            org.opencontainers.image.description=Self-hosted flow runner for Echopoint
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
