name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_latest
        run: |
          # Highest semver tag regardless of reachability. The repository history
          # was squashed, so `git describe --tags` cannot see pre-squash tags and
          # would incorrectly fall back to v0.0.0.
          latest_tag=$(git tag --sort=-v:refname | head -n1)
          [ -z "$latest_tag" ] && latest_tag="v0.0.0"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $latest_tag"

      - name: Calculate new version
        id: tag
        run: |
          latest_tag="${{ steps.get_latest.outputs.latest_tag }}"

          if [[ $latest_tag =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
          else
            major=0
            minor=0
            patch=0
          fi

          # Default: minor bump.
          new_minor=$((minor + 1))
          new_tag="v${major}.${new_minor}.0"

          # Guard against collision with an existing tag.
          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "::error::Computed tag $new_tag already exists; bump manually." >&2
            exit 1
          fi

          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "New tag: $new_tag"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}

  goreleaser:
    name: Release
    runs-on: ubuntu-latest
    needs: create-tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
